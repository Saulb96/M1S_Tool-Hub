<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Metro1 — Tools Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1d1d1f;
    --ink-soft:#6e6e73;
    --ink-faint:#86868b;
    --accent:#0071e3;
    --hairline:rgba(0,0,0,.08);
    --radius:24px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    letter-spacing:-.011em;
    min-height:100%;
    display:flex;flex-direction:column;
    padding:clamp(40px,8vw,100px) clamp(22px,6vw,64px);
    position:relative;
    /* ambient backdrop — glass needs something to refract */
    background:#eef1f6;
  }
  /* soft adaptive-color blooms behind the glass */
  body::before,body::after{
    content:"";position:fixed;z-index:0;border-radius:50%;
    filter:blur(90px);opacity:.55;pointer-events:none;
  }
  body::before{
    width:46vw;height:46vw;left:-8vw;top:-6vw;
    background:radial-gradient(circle,#bcd4ff,transparent 70%);
  }
  body::after{
    width:42vw;height:42vw;right:-10vw;bottom:-8vw;
    background:radial-gradient(circle,#ffd9c2,transparent 70%);
  }
  .wrap{width:100%;max-width:960px;margin:0 auto;flex:1;position:relative;z-index:1}

  /* ── header ── */
  header{margin-bottom:clamp(36px,6vw,58px)}
  .logo{
    height:30px;width:auto;display:block;margin-bottom:18px;
  }
  h1{
    font-size:clamp(40px,7vw,60px);
    font-weight:700;letter-spacing:-.03em;line-height:1.04;
  }
  .sub{
    margin-top:12px;font-size:16px;color:var(--ink-soft);
    font-weight:400;letter-spacing:-.01em;
  }

  /* ── grid ── */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,210px));
    justify-content:start;
    gap:16px;
  }

  /* ── liquid glass card (square) ── */
  .card{
    position:relative;
    aspect-ratio:1/1;
    display:flex;flex-direction:column;
    align-items:flex-start;justify-content:space-between;
    padding:16px;
    border-radius:20px;
    text-decoration:none;color:inherit;
    background:rgba(255,255,255,.55);
    -webkit-backdrop-filter:blur(20px) saturate(1.7);
    backdrop-filter:blur(20px) saturate(1.7);
    border:1px solid rgba(255,255,255,.7);
    box-shadow:
      0 1px 1px rgba(255,255,255,.6) inset,   /* specular top edge */
      0 8px 28px rgba(20,28,45,.10),
      0 1px 3px rgba(20,28,45,.06);
    transition:transform .4s cubic-bezier(.32,.72,0,1),
               box-shadow .4s cubic-bezier(.32,.72,0,1),
               background .4s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,.72);
    box-shadow:
      0 1px 1px rgba(255,255,255,.8) inset,
      0 16px 40px rgba(20,28,45,.16),
      0 2px 6px rgba(20,28,45,.08);
  }
  .card:hover .chev{transform:translateX(3px);color:var(--accent)}

  /* solid chip — text/icon never floats directly on glass */
  .mono{
    width:40px;height:40px;flex:none;
    border-radius:12px;
    display:grid;place-items:center;
    background:linear-gradient(150deg,#0a84ff,#0058c8);
    color:#fff;font-size:18px;font-weight:600;
    box-shadow:0 4px 10px rgba(0,90,200,.30),
               0 1px 1px rgba(255,255,255,.4) inset;
  }
  .label{width:100%;min-width:0;
    display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .label .text{min-width:0}
  .label .name{
    font-size:14.5px;font-weight:600;letter-spacing:-.015em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .label .open{
    font-size:11.5px;color:var(--ink-faint);margin-top:1px;
  }
  .chev{
    flex:none;font-size:16px;color:var(--ink-faint);
    transition:transform .4s cubic-bezier(.32,.72,0,1),color .3s ease;
  }

  /* ── footer ── */
  footer{
    margin-top:clamp(48px,8vw,80px);
    padding-top:24px;
    border-top:1px solid var(--hairline);
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
    font-size:12.5px;color:var(--ink-faint);
  }

  /* accessibility: drop transparency if the user asks for it */
  @media (prefers-reduced-transparency:reduce){
    .card{background:#fff;-webkit-backdrop-filter:none;backdrop-filter:none}
  }
  @media (prefers-reduced-motion:reduce){
    .card,.chev{transition:none}
  }
</style>
</head>
